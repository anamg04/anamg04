name: Generate Bomberman Animation

on:
  # Se ejecuta automáticamente cada 24 horas
  schedule:
    - cron: "0 0 * * *"
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Genera los archivos SVG del juego Bomberman
      - name: generate-bomberman-svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/bomberman-contribution-graph.svg?palette=github-light&game=bomberman
            dist/bomberman-contribution-graph-dark.svg?palette=github-dark&game=bomberman
          
      # Sube los archivos generados a la rama 'pacman-output'
      - name: push-to-pacman-output-branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

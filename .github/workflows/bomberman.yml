name: Generate Bomberman Garph

on:
  schedule: # Se ejecuta cada 24 horas
    - cron: "0 0 * * *" 
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      # Aquí va la acción específica que transforma tu historial de commits en Bomberman
      # Asegúrate de que la acción que usas guarde los resultados en la rama 'pacman-output'
      - name: generate bomberman-contribution-graph.svg
        uses: tu-usuario-o-creador/bomberman-action-repo@master # Cambia esto por la acción real de Bomberman
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/bomberman-contribution-graph.svg
            dist/bomberman-contribution-graph-dark.svg?palette=github-dark

      # Sube los archivos generados a la rama de salida
      - name: push bomberman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
